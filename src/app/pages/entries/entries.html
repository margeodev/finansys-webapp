<div class="entries-page">

  <h1 class="page-title">Lançamentos</h1>

  <div class="filter-bar">
    <p-datePicker
      view="month"
      displayFormat="MM/yyyy"
      inputFormat="MM/yyyy"
      [(ngModel)]="mesAnoSelecionado"
      [showIcon]="true"
      [minDate]="minDate"
      [maxDate]="maxDate"
      placeholder="Selecione mês e ano">
    </p-datePicker>

    <p-button
      label="Pesquisar"
      icon="pi pi-search"
      [loading]="isLoading"
      (onClick)="load()"
      severity="success"/>
  </div>

  @if (userOneHeader != null || userTwoHeader != null) {
    <div class="users-grid">

      @if (isAdmin || currentUserIndex === 0) {
        <div class="user-column user-one">
          <app-entry-header [userHeader]="userOneHeader"></app-entry-header>
          <div class="tabs-wrapper">
            <p-tabs value="0">
              <p-tablist>
                <p-tab value="0">Compartilhadas</p-tab>
                <p-tab value="1">Pessoal</p-tab>
              </p-tablist>
              <p-tabpanels>
                <p-tabpanel value="0">
                  <app-entry-table
                    [userName]="userOneHeader!.userName!"
                    [userId]="users[0]?.id ?? null"
                    [dateParam]="dateParam"
                    [allEntries]="userOneEntries">
                  </app-entry-table>
                </p-tabpanel>
                <p-tabpanel value="1">
                  <app-entry-table
                    [userName]="userOneHeader!.userName!"
                    [userId]="users[0]?.id ?? null"
                    [dateParam]="dateParam"
                    [allEntries]="userOneEntries"
                    [isPersonal]="true">
                  </app-entry-table>
                </p-tabpanel>
              </p-tabpanels>
            </p-tabs>
          </div>
        </div>
      }

      @if (isAdmin || currentUserIndex === 1) {
        <div class="user-column user-two">
          <app-entry-header [userHeader]="userTwoHeader"></app-entry-header>
          <div class="tabs-wrapper">
            <p-tabs value="0">
              <p-tablist>
                <p-tab value="0">Compartilhadas</p-tab>
                <p-tab value="1">Pessoal</p-tab>
              </p-tablist>
              <p-tabpanels>
                <p-tabpanel value="0">
                  <app-entry-table
                    [userName]="userTwoHeader!.userName!"
                    [userId]="users[1]?.id ?? null"
                    [dateParam]="dateParam"
                    [allEntries]="userTwoEntries">
                  </app-entry-table>
                </p-tabpanel>
                <p-tabpanel value="1">
                  <app-entry-table
                    [userName]="userTwoHeader!.userName!"
                    [userId]="users[1]?.id ?? null"
                    [dateParam]="dateParam"
                    [allEntries]="userTwoEntries"
                    [isPersonal]="true">
                  </app-entry-table>
                </p-tabpanel>
              </p-tabpanels>
            </p-tabs>
          </div>
        </div>
      }

    </div>
  } @else {
    <div class="loading-state">
      <p-progressSpinner
        strokeWidth="4"
        animationDuration=".5s"
        [style]="{width: '40px', height: '40px'}">
      </p-progressSpinner>
      <span>Carregando...</span>
    </div>
  }

</div>
