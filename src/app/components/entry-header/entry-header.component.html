<p-card>
  <div class="header-layout">

    <div class="header-left">
      <span class="user-name-label">{{ userName }}</span>
      <button class="add-btn" (click)="showCreateDialog()">
        <span class="add-btn-icon">+</span>
        <span>Adicionar</span>
      </button>
    </div>

    <div class="metrics-row">
      <div class="metric-block">
        <span class="metric-label">Total</span>
        <span class="metric-value">{{ subTotal | brl }}</span>
      </div>

      <div class="metric-block">
        <span class="metric-label">Individual</span>
        <span class="metric-value">{{ totalPersonal | brl }}</span>
      </div>

      <div class="metric-block saldo-block">
        <span class="metric-label">Saldo</span>
        <span class="metric-value" [ngClass]="{
          positive: (saldo ?? 0) > 0,
          negative: (saldo ?? 0) < 0,
          neutral: saldo === 0
        }">{{ saldo | brl }}</span>
      </div>
    </div>

  </div>
</p-card>

<p-dialog header="Nova Despesa" [modal]="true" [(visible)]="visible" [style]="{'width': '25rem'}" [breakpoints]="{'768px': '92vw'}">
  <app-entry-form [userId]="userHeader?.id"></app-entry-form>
</p-dialog>
