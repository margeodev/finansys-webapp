<p-menubar [model]="items">
  <ng-template pTemplate="start">
    <span class="app-brand">Finansys</span>
  </ng-template>

  <ng-template pTemplate="end">
    @if (currentUser$ | async; as user) {
      <div class="nav-user">
        <div class="nav-user-avatar">{{ (user.username || user.email || '?').charAt(0).toUpperCase() }}</div>
        {{ user.username || user.email }}
      </div>
    }
    <p-button
      label="Sair"
      icon="pi pi-sign-out"
      (onClick)="logout()"
      styleClass="logout-btn"
    />
  </ng-template>
</p-menubar>
